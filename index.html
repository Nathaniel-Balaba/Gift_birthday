<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>For Pich</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: linear-gradient(135deg, #0a0015 0%, #1a0a2e 50%, #0f0520 100%);
            font-family: 'Segoe UI', sans-serif; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            min-height: 100dvh;
        }
        
        #canvas-container { 
            width: 100vw; 
            height: 100vh;
            height: 100dvh;
            display: block; 
            cursor: pointer; 
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(255, 20, 147, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(147, 51, 234, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }
        
        .aurora-wave {
            position: absolute;
            width: 200%;
            height: 60%;
            top: -20%;
            left: -50%;
            background: linear-gradient(180deg, 
                transparent 0%,
                rgba(255, 105, 180, 0.03) 30%,
                rgba(147, 51, 234, 0.05) 50%,
                transparent 100%
            );
            filter: blur(40px);
            animation: auroraMove 20s ease-in-out infinite;
            transform-origin: center;
            /* Added GPU acceleration */
            will-change: transform;
            transform: translateZ(0);
        }
        
        @keyframes auroraMove {
            0%, 100% { transform: translateX(-10%) rotate(-3deg) translateZ(0); }
            50% { transform: translateX(10%) rotate(3deg) translateZ(0); }
        }
        
        .floating-hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        
        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatUp 10s ease-in infinite;
            opacity: 0;
            /* Added GPU acceleration */
            will-change: transform, opacity;
            transform: translateZ(0);
        }
        
        @keyframes floatUp {
            0% { 
                transform: translateY(100vh) rotate(0deg) translateZ(0); 
                opacity: 0; 
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { 
                transform: translateY(-100px) rotate(360deg) translateZ(0); 
                opacity: 0; 
            }
        }
        
        .sparkles {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }
        
        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: sparkle 3s ease-in-out infinite;
            box-shadow: 0 0 6px #fff, 0 0 12px #ff69b4;
            /* Added GPU acceleration */
            will-change: transform, opacity;
            transform: translateZ(0);
        }
        
        @keyframes sparkle {
            0%, 100% { transform: scale(0) translateZ(0); opacity: 0; }
            50% { transform: scale(1) translateZ(0); opacity: 1; }
        }
        
        .shooting-stars {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        
        .shooting-star {
            position: absolute;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, #fff, transparent);
            border-radius: 50%;
            animation: shoot 4s linear infinite;
            opacity: 0;
            /* Added GPU acceleration */
            will-change: transform, opacity;
            transform: translateZ(0);
        }
        
        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(0) translateZ(0); opacity: 0; }
            5% { opacity: 1; }
            30% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(150px) translateZ(0); opacity: 0; }
        }

        #ui-layer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            transition: all 1s ease-out;
            width: 100%;
            padding: 20px;
        }
        
        #ui-layer.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            pointer-events: none;
        }
        
        .gift-icon {
            font-size: clamp(60px, 15vw, 100px);
            animation: bounce 1s ease-in-out infinite;
            display: block;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.8));
            /* Added GPU acceleration */
            will-change: transform;
            transform: translateZ(0);
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) translateZ(0); }
            50% { transform: translateY(-15px) translateZ(0); }
        }
        
        .subtitle {
            color: rgba(255, 182, 193, 0.9);
            font-size: clamp(0.8rem, 3vw, 1rem);
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        button {
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.3) 0%, rgba(147, 51, 234, 0.3) 100%);
            border: 2px solid rgba(255, 105, 180, 0.6);
            color: #fff;
            padding: 16px 40px;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            max-width: 90%;
            position: relative;
            overflow: hidden;
        }

        button:hover, button:active {
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.5) 0%, rgba(147, 51, 234, 0.5) 100%);
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.6);
        }

        #message {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            width: 100%;
            text-align: center;
            color: rgba(255, 182, 193, 0.8);
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            pointer-events: none;
            letter-spacing: 1px;
            padding: 0 20px;
            z-index: 50;
        }
        
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
            overflow: hidden;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 5s linear forwards;
            opacity: 0;
            /* Added GPU acceleration */
            will-change: transform, opacity;
            transform: translateZ(0);
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg) translateZ(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg) translateZ(0); opacity: 0; }
        }
        
        .message-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.2), rgba(147, 51, 234, 0.2));
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 105, 180, 0.5);
            border-radius: 20px;
            padding: 25px 40px;
            color: #fff;
            font-size: clamp(1rem, 4vw, 1.5rem);
            text-align: center;
            z-index: 300;
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.5);
            max-width: 90%;
        }
        
        .message-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.5) 0%, transparent 70%);
            transform: scale(0);
            animation: rippleEffect 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 150;
            /* Added GPU acceleration */
            will-change: transform, opacity;
        }
        
        @keyframes rippleEffect {
            to { transform: scale(3) translateZ(0); opacity: 0; }
        }
        
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(50px);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    
    <div class="aurora">
        <div class="aurora-wave"></div>
    </div>
    
    <div class="orb" style="width: 250px; height: 250px; background: rgba(255, 20, 147, 0.08); top: 10%; left: 10%;"></div>
    <div class="orb" style="width: 200px; height: 200px; background: rgba(147, 51, 234, 0.08); top: 60%; right: 10%;"></div>
    
    <div class="floating-hearts" id="floating-hearts"></div>
    <div class="sparkles" id="sparkles"></div>
    <div class="shooting-stars" id="shooting-stars"></div>
    <div class="confetti-container" id="confetti-container"></div>

    <div id="ui-layer">
        <span class="gift-icon">🎁</span>
        <p class="subtitle">A Special Gift Awaits</p>
        <button id="start-btn">Open Gift for Phich</button>
    </div>

    <div id="canvas-container"></div>
    <div id="message">Tap anywhere for Magic Fireworks</div>
    
    <div class="message-popup" id="message-popup"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';

        const NAME = "Chona";
        const GREETING = "Happy Birthday";
        
        const BIRTHDAY_MESSAGES = [
            "You deserve all the happiness in the world!",
            "May all your dreams come true this year!",
            "You are truly amazing and inspiring!",
            "Wishing you endless joy and success!",
            "You inspire everyone around you!",
            "May this year bring you everything you wish for!",
            "You are a blessing to everyone who knows you!",
            "Keep shining bright, superstar!",
            "You make the world a better place!",
            "May your day be as wonderful as you are!"
        ];

        let audioContext;
        let isAudioInitialized = false;
        let melodyLoopInterval = null;
        
        function initAudio() {
            if (isAudioInitialized) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            isAudioInitialized = true;
        }
        
        function playHappyBirthdayMelody() {
            if (!audioContext) return 0;
            
            const melody = [
                { freq: 262, dur: 0.3 },  // C4 - Hap
                { freq: 262, dur: 0.3 },  // C4 - py
                { freq: 294, dur: 0.6 },  // D4 - Birth
                { freq: 262, dur: 0.6 },  // C4 - day
                { freq: 349, dur: 0.6 },  // F4 - to
                { freq: 330, dur: 1.2 },  // E4 - you
                
                { freq: 262, dur: 0.3 },  // C4 - Hap
                { freq: 262, dur: 0.3 },  // C4 - py
                { freq: 294, dur: 0.6 },  // D4 - Birth
                { freq: 262, dur: 0.6 },  // C4 - day
                { freq: 392, dur: 0.6 },  // G4 - to
                { freq: 349, dur: 1.2 },  // F4 - you
                
                { freq: 262, dur: 0.3 },  // C4 - Hap
                { freq: 262, dur: 0.3 },  // C4 - py
                { freq: 523, dur: 0.6 },  // C5 - Birth
                { freq: 440, dur: 0.6 },  // A4 - day
                { freq: 349, dur: 0.6 },  // F4 - dear
                { freq: 330, dur: 0.6 },  // E4 - Cho
                { freq: 294, dur: 1.2 },  // D4 - na
                
                { freq: 466, dur: 0.3 },  // Bb4 - Hap
                { freq: 466, dur: 0.3 },  // Bb4 - py
                { freq: 440, dur: 0.6 },  // A4 - Birth
                { freq: 349, dur: 0.6 },  // F4 - day
                { freq: 392, dur: 0.6 },  // G4 - to
                { freq: 349, dur: 1.2 }   // F4 - you
            ];
            
            let time = 0;
            melody.forEach((note) => {
                setTimeout(() => {
                    playNote(note.freq, note.dur * 0.9);
                }, time * 1000);
                time += note.dur * 0.55;
            });
            
            // Return total duration in milliseconds
            return time * 1000;
        }
        
        function startMelodyLoop() {
            if (melodyLoopInterval) return; // Already playing
            
            // Play immediately first time
            const duration = playHappyBirthdayMelody();
            
            // Loop the melody infinitely with a small gap
            melodyLoopInterval = setInterval(() => {
                playHappyBirthdayMelody();
            }, duration + 1500); // Add 1.5 second gap between loops
        }
        
        function playNote(frequency, duration) {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            oscillator.type = 'triangle';
            
            gainNode.gain.setValueAtTime(0.25, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }
        
        function playChime(frequency = 800, duration = 0.3) {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }
        
        function playSparkle() {
            if (!audioContext) return;
            
            const frequencies = [1200, 1500, 1800];
            frequencies.forEach((freq, i) => {
                setTimeout(() => playChime(freq, 0.1), i * 40);
            });
        }
        
        function playExplosion() {
            if (!audioContext) return;
            
            const bufferSize = audioContext.sampleRate * 0.2;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioContext.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, audioContext.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.2);
            
            const gainNode = audioContext.createGain();
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            noise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            noise.start();
            
            setTimeout(playSparkle, 80);
        }

        const startBtn = document.getElementById('start-btn');
        const uiLayer = document.getElementById('ui-layer');
        const floatingHeartsContainer = document.getElementById('floating-hearts');
        const sparklesContainer = document.getElementById('sparkles');
        const shootingStarsContainer = document.getElementById('shooting-stars');
        const confettiContainer = document.getElementById('confetti-container');
        const messagePopup = document.getElementById('message-popup');

        let scene, camera, renderer, composer, controls;
        let textGroup, subTextGroup;
        let particleSystem, heartParticles;
        let started = false;
        let textGrowScale = 0;
        let controlsAutoRotate = true;
        
        const mouse = new THREE.Vector2();
        let fireworks = [];
        
        let lastTextChange = 0;
        let currentNoteIndex = 0;
        let fontGlobal;
        
        let lastHeartTime = 0;
        function createFloatingHearts() {
            const hearts = ['🎂', '🎁', '🎈', '🎉', '🎊', '⭐', '✨'];
            const colors = ['#ff69b4', '#ff1493', '#ffd700', '#9333ea', '#fff'];
            
            setInterval(() => {
                if (!started) return;
                
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                heart.style.fontSize = (15 + Math.random() * 15) + 'px';
                heart.style.animationDuration = (8 + Math.random() * 4) + 's';
                
                floatingHeartsContainer.appendChild(heart);
                
                setTimeout(() => heart.remove(), 14000);
            }, 600);
        }
        
        function createSparkles() {
            for (let i = 0; i < 20; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 3 + 's';
                sparkle.style.animationDuration = (2 + Math.random() * 2) + 's';
                sparklesContainer.appendChild(sparkle);
            }
        }
        
        function createShootingStars() {
            setInterval(() => {
                if (!started) return;
                
                const star = document.createElement('div');
                star.className = 'shooting-star';
                star.style.top = Math.random() * 50 + '%';
                star.style.left = '-100px';
                
                shootingStarsContainer.appendChild(star);
                
                setTimeout(() => star.remove(), 4000);
            }, 3000);
        }
        
        function createConfettiBurst() {
            const colors = ['#ff69b4', '#ff1493', '#ffd700', '#9333ea', '#fff', '#00ff88'];
            const shapes = ['🎂', '⭐', '✨', '🎈', '🎉', '🎊'];
            
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.textContent = Math.random() > 0.6 ? shapes[Math.floor(Math.random() * shapes.length)] : '';
                    confetti.style.fontSize = confetti.textContent ? '18px' : '8px';
                    confetti.style.width = confetti.textContent ? 'auto' : (5 + Math.random() * 8) + 'px';
                    confetti.style.height = confetti.textContent ? 'auto' : (5 + Math.random() * 8) + 'px';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    confetti.style.animationDuration = (4 + Math.random() * 2) + 's';
                    
                    confettiContainer.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 6000);
                }, i * 30);
            }
        }
        
        function showMessage(note) {
            messagePopup.textContent = note;
            messagePopup.classList.add('show');
            playSparkle();
            
            setTimeout(() => {
                messagePopup.classList.remove('show');
            }, 2500);
        }
        
        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '80px';
            ripple.style.height = '80px';
            document.body.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 800);
        }

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0015, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            adjustCameraPosition();

            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = controlsAutoRotate;
            controls.autoRotateSpeed = 0.6;
            controls.enableZoom = false;
            controls.enablePan = false;

            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);
            
            const light1 = new THREE.PointLight(0xff69b4, 1.5, 100);
            light1.position.set(10, 10, 10);
            scene.add(light1);
            
            const light2 = new THREE.PointLight(0x9333ea, 1, 100);
            light2.position.set(-10, -10, 10);
            scene.add(light2);
            
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.85);
            bloomPass.strength = 1.8;
            bloomPass.radius = 0.5;
            bloomPass.threshold = 0.2;
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            createBackgroundParticles();
            createSparkles();
            createShootingStars();
            
            startBtn.addEventListener('click', () => {
                initAudio();
                started = true;
                uiLayer.classList.add('hidden');
                setTimeout(() => uiLayer.remove(), 1000);
                
                startMelodyLoop();
                
                createConfettiBurst();
                createFloatingHearts();
                
                loadText();
                
                setTimeout(() => showMessage("Happy Birthday Chona!"), 1500);
            });

            window.addEventListener('pointerdown', onDocumentPointerDown, false);
            window.addEventListener('resize', onWindowResize, false);
        }

        function adjustCameraPosition() {
            const aspect = window.innerWidth / window.innerHeight;
            camera.position.set(0, 0, aspect < 1 ? 38 : 25);
        }

        function onDocumentPointerDown(event) {
            if (!started) return;
            
            initAudio();
            createRipple(event.clientX, event.clientY);

            if (controlsAutoRotate) {
                controlsAutoRotate = false;
                controls.autoRotate = false;
            }

            event.preventDefault();

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            const pos = camera.position.clone().add(dir.multiplyScalar(distance));
            
            createFirework(pos);
            
            if (Math.random() > 0.7) {
                const randomNote = BIRTHDAY_MESSAGES[Math.floor(Math.random() * BIRTHDAY_MESSAGES.length)];
                setTimeout(() => showMessage(randomNote), 500);
            }
        }

        function createFirework(targetPos) {
            playChime(400 + Math.random() * 200, 0.4);
            
            const firework = {
                mesh: new THREE.Mesh(
                    new THREE.SphereGeometry(0.12, 8, 8),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                ),
                target: targetPos,
                position: new THREE.Vector3(targetPos.x * 0.3, targetPos.y - 25, targetPos.z),
                velocity: new THREE.Vector3(0, 1.5, 0),
                exploded: false,
                particles: []
            };
            
            firework.velocity.copy(targetPos).sub(firework.position).normalize().multiplyScalar(2);
            firework.mesh.position.copy(firework.position);
            scene.add(firework.mesh);
            fireworks.push(firework);
        }

        function explodeFirework(firework) {
            scene.remove(firework.mesh);
            firework.exploded = true;
            
            playExplosion();

            const heartShape = new THREE.Shape();
            const x = 0, y = 0;
            heartShape.moveTo(x + 0.25, y + 0.25);
            heartShape.bezierCurveTo(x + 0.25, y + 0.25, x + 0.20, y, x, y);
            heartShape.bezierCurveTo(x - 0.30, y, x - 0.30, y + 0.35, x - 0.30, y + 0.35);
            heartShape.bezierCurveTo(x - 0.30, y + 0.55, x - 0.10, y + 0.77, x + 0.25, y + 0.95);
            heartShape.bezierCurveTo(x + 0.60, y + 0.77, x + 0.80, y + 0.55, x + 0.80, y + 0.35);
            heartShape.bezierCurveTo(x + 0.80, y + 0.35, x + 0.80, y, x + 0.50, y);
            heartShape.bezierCurveTo(x + 0.35, y, x + 0.25, y + 0.25, x + 0.25, y + 0.25);
            
            const heartGeo = new THREE.ShapeGeometry(heartShape);
            const sphereGeo = new THREE.SphereGeometry(0.08, 6, 6);
            
            const colors = [0xff1493, 0xff69b4, 0xffd700, 0xffffff, 0x9333ea];
            const geometries = [heartGeo, sphereGeo];

            for (let i = 0; i < 45; i++) {
                const colorIndex = Math.floor(Math.random() * colors.length);
                const mat = new THREE.MeshBasicMaterial({ 
                    color: colors[colorIndex], 
                    side: THREE.DoubleSide,
                    transparent: true
                });
                
                const geo = geometries[Math.floor(Math.random() * geometries.length)];
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(firework.target);
                
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const speed = Math.random() * 0.5 + 0.2;
                
                p.userData = {
                    velocity: new THREE.Vector3(
                        Math.sin(phi) * Math.cos(theta) * speed,
                        Math.sin(phi) * Math.sin(theta) * speed,
                        Math.cos(phi) * speed
                    ),
                    life: 1.0,
                    decay: Math.random() * 0.03 + 0.015
                };
                
                p.scale.set(0.35, 0.35, 0.35);
                p.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                
                scene.add(p);
                firework.particles.push(p);
            }
        }

        function updateFireworks() {
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const fw = fireworks[i];
                
                if (!fw.exploded) {
                    fw.mesh.position.add(fw.velocity);
                    
                    if (fw.mesh.position.distanceTo(fw.target) < 1.5 || fw.mesh.position.y > fw.target.y) {
                        explodeFirework(fw);
                    }
                } else {
                    for (let j = fw.particles.length - 1; j >= 0; j--) {
                        const p = fw.particles[j];
                        p.position.add(p.userData.velocity);
                        p.userData.velocity.y -= 0.008;
                        p.userData.velocity.multiplyScalar(0.97);
                        p.userData.life -= p.userData.decay;
                        
                        const scale = Math.max(p.userData.life * 0.35, 0);
                        p.scale.setScalar(scale);
                        p.material.opacity = p.userData.life;
                        
                        if (p.userData.life <= 0) {
                            scene.remove(p);
                            fw.particles.splice(j, 1);
                        }
                    }
                    if (fw.particles.length === 0) {
                        fireworks.splice(i, 1);
                    }
                }
            }
        }

        function loadText() {
            const loader = new FontLoader();
            loader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', function (font) {
                fontGlobal = font;
                createMainText();
                createHeartRing();
                updateSubText();
            });
        }

        function createMainText() {
            if (textGroup) scene.remove(textGroup);
            
            textGroup = new THREE.Group();
            
            const greetingGeo = new TextGeometry(GREETING, {
                font: fontGlobal, size: 2, height: 0.25, curveSegments: 12,
                bevelEnabled: true, bevelThickness: 0.06, bevelSize: 0.03, bevelSegments: 4
            });
            greetingGeo.center();
            
            const greetingMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                emissive: 0xff1493,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.2
            });
            const greetingMesh = new THREE.Mesh(greetingGeo, greetingMat);
            greetingMesh.position.y = 1.5;
            textGroup.add(greetingMesh);
            
            const nameGeo = new TextGeometry(NAME, {
                font: fontGlobal, size: 3, height: 0.3, curveSegments: 12,
                bevelEnabled: true, bevelThickness: 0.08, bevelSize: 0.04, bevelSegments: 4
            });
            nameGeo.center();
            
            const nameMat = new THREE.MeshStandardMaterial({
                color: 0xff69b4,
                emissive: 0xff1493,
                emissiveIntensity: 0.6,
                metalness: 0.8,
                roughness: 0.2
            });
            const nameMesh = new THREE.Mesh(nameGeo, nameMat);
            nameMesh.position.y = -2;
            textGroup.add(nameMesh);
            
            const cakeGeo = new TextGeometry('🎂', {
                font: fontGlobal, size: 1.2, height: 0.08
            });
            cakeGeo.center();
            const cakeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const cakeMesh = new THREE.Mesh(cakeGeo, cakeMat);
            cakeMesh.position.y = -5;
            textGroup.add(cakeMesh);
            
            scene.add(textGroup);
            textGroup.scale.set(0, 0, 0);
            textGrowScale = 0;
        }
        
        function createHeartRing() {
            const heartShape = new THREE.Shape();
            const x = 0, y = 0;
            heartShape.moveTo(x + 0.25, y + 0.25);
            heartShape.bezierCurveTo(x + 0.25, y + 0.25, x + 0.20, y, x, y);
            heartShape.bezierCurveTo(x - 0.30, y, x - 0.30, y + 0.35, x - 0.30, y + 0.35);
            heartShape.bezierCurveTo(x - 0.30, y + 0.55, x - 0.10, y + 0.77, x + 0.25, y + 0.95);
            heartShape.bezierCurveTo(x + 0.60, y + 0.77, x + 0.80, y + 0.55, x + 0.80, y + 0.35);
            heartShape.bezierCurveTo(x + 0.80, y + 0.35, x + 0.80, y, x + 0.50, y);
            heartShape.bezierCurveTo(x + 0.35, y, x + 0.25, y + 0.25, x + 0.25, y + 0.25);
            
            const geo = new THREE.ShapeGeometry(heartShape);
            const colors = [0xff1493, 0xff69b4, 0xffd700, 0x9333ea];
            
            heartParticles = new THREE.Group();
            
            for (let i = 0; i < 12; i++) {
                const mat = new THREE.MeshBasicMaterial({
                    color: colors[i % colors.length],
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.7
                });
                const heart = new THREE.Mesh(geo, mat);
                
                const angle = (i / 12) * Math.PI * 2;
                const radius = 11 + Math.sin(i * 0.5) * 1.5;
                heart.position.x = Math.cos(angle) * radius;
                heart.position.z = Math.sin(angle) * radius;
                heart.position.y = Math.sin(i * 0.8) * 2.5;
                
                heart.scale.set(0.7, 0.7, 0.7);
                heart.userData = { angle, radius, yOffset: i * 0.8 };
                
                heartParticles.add(heart);
            }
            
            scene.add(heartParticles);
        }

        function updateSubText() {
            if (!started) return;
            
            if (subTextGroup) scene.remove(subTextGroup);

            const message = BIRTHDAY_MESSAGES[currentNoteIndex];
            currentNoteIndex = (currentNoteIndex + 1) % BIRTHDAY_MESSAGES.length;

            const textGeo = new TextGeometry(message, {
                font: fontGlobal, size: 0.6, height: 0.04, curveSegments: 6
            });
            textGeo.center();
            
            const textMat = new THREE.MeshBasicMaterial({ 
                color: 0xffc0cb, 
                transparent: true, 
                opacity: 0 
            });
            subTextGroup = new THREE.Mesh(textGeo, textMat);
            subTextGroup.position.y = -7;
            scene.add(subTextGroup);

            lastTextChange = Date.now();
        }

        function createBackgroundParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 1000;
            const posArray = new Float32Array(count * 3);
            const colorArray = new Float32Array(count * 3);
            
            const colors = [
                new THREE.Color(0xff69b4),
                new THREE.Color(0xff1493),
                new THREE.Color(0xffd700),
                new THREE.Color(0x9333ea),
                new THREE.Color(0xffffff)
            ];
            
            for (let i = 0; i < count; i++) {
                posArray[i * 3] = (Math.random() - 0.5) * 100;
                posArray[i * 3 + 1] = (Math.random() - 0.5) * 100;
                posArray[i * 3 + 2] = (Math.random() - 0.5) * 100;
                
                const color = colors[Math.floor(Math.random() * colors.length)];
                colorArray[i * 3] = color.r;
                colorArray[i * 3 + 1] = color.g;
                colorArray[i * 3 + 2] = color.b;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.18,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            adjustCameraPosition();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now();

            if (started && textGroup) {
                if (textGrowScale < 1) {
                    textGrowScale += 0.04;
                    const s = Math.min(textGrowScale, 1.05);
                    textGroup.scale.set(s, s, s);
                    if (textGrowScale >= 1) textGrowScale = 1;
                } else {
                    const pulse = 1 + Math.sin(time * 0.003) * 0.025;
                    textGroup.scale.set(pulse, pulse, pulse);
                }

                textGroup.rotation.y = Math.sin(time * 0.0004) * 0.08;
                
                if (heartParticles) {
                    heartParticles.children.forEach((heart, i) => {
                        const t = time * 0.0008;
                        const angle = heart.userData.angle + t * 0.25;
                        const radius = heart.userData.radius;
                        
                        heart.position.x = Math.cos(angle) * radius;
                        heart.position.z = Math.sin(angle) * radius;
                        heart.position.y = Math.sin(t * 1.5 + heart.userData.yOffset) * 2.5;
                        
                        heart.rotation.y = t;
                    });
                }
                
                if (subTextGroup) {
                    const elapsed = time - lastTextChange;
                    if (elapsed < 1000) {
                        subTextGroup.material.opacity = elapsed / 1000;
                    } else if (elapsed < 4500) {
                        subTextGroup.material.opacity = 1;
                        subTextGroup.position.y = -7 + Math.sin(time * 0.002) * 0.15;
                    } else if (elapsed < 5500) {
                        subTextGroup.material.opacity = 1 - ((elapsed - 4500) / 1000);
                    } else {
                        subTextGroup.material.opacity = 0;
                        updateSubText();
                    }
                }
                
                updateFireworks();
            }

            if (particleSystem) {
                particleSystem.rotation.y += 0.0005;
            }

            controls.update();
            composer.render();
        }
    </script>
</body>
</html>
